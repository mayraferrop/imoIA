services:
  - type: web
    name: imoia-api
    runtime: docker
    plan: free
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WHAPI_TOKEN
        sync: false
  - type: web
    name: imoia-dashboard
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile.streamlit
    envVars:
      - key: API_BASE_URL
        value: https://imoia.onrender.com
      - key: DATABASE_URL
        sync: false
