services:
  - type: web
    name: imoia-api
    runtime: docker
    plan: free
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WHAPI_TOKEN
        sync: false

  - type: web
    name: imoia-whatsapp-bridge
    runtime: docker
    plan: starter
    region: frankfurt
    rootDir: whatsapp-bridge
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    disk:
      name: bridge-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: PORT
        value: 3000
      - key: BRIDGE_TOKEN
        sync: false
      - key: BAILEYS_LOG
        value: silent
