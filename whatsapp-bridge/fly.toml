# Fly.io config — imoIA WhatsApp Bridge
# Deploy: fly launch --no-deploy (primeira vez) → fly volumes create bridge_data --size 1 → fly deploy

app = "imoia-whatsapp-bridge"
primary_region = "mad"

[build]
  dockerfile = "Dockerfile"

[env]
  DATA_DIR = "/data"
  PORT = "3000"

[[mounts]]
  source = "bridge_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
